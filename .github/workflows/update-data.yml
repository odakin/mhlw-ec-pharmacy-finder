name: Update MHLW EC pharmacy list

on:
  schedule:
    # GitHub Actions cron is UTC. 03:00 JST = 18:00 UTC.
    - cron: '0 18 * * *'
  workflow_dispatch:

# Allow the workflow to commit & push
permissions:
  contents: write

concurrency:
  group: update-mhlw-ec-pharmacy-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Update pharmacy data
        run: |
          python scripts/update_data.py

      - name: Update clinic data
        run: |
          python scripts/update_clinics.py
        continue-on-error: true

      - name: Geocode new/changed addresses
        run: |
          python scripts/geocode.py --limit 500
        continue-on-error: true

      - name: Validate docs/data.json (strict JSON)
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/data.json','utf8'))"
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('docs/data.json','utf8'));
          if (!j || typeof j !== 'object') throw new Error('data.json must be an object');
          if (!j.meta || typeof j.meta !== 'object') throw new Error('missing meta');
          if (!Array.isArray(j.data)) throw new Error('data must be an array');
          const r = j.data.find(x => x && typeof x === 'object');
          if (!r) throw new Error('data has no records');
          for (const k of ['pref','name','addr']) {
            if (!(k in r)) throw new Error(`missing key in records: ${k}`);
          }
          const ok = j.data.some(x => x && typeof x === 'object' && x.pref && x.name && x.addr);
          if (!ok) throw new Error('records exist but look empty (pref/name/addr missing)');
          // Ensure empty-record exclusion and two-layer count are intact (DESIGN.md §3, §8)
          if (typeof j.meta.totalPublished !== 'number' || j.meta.totalPublished < j.data.length) {
            throw new Error(`meta.totalPublished missing or invalid: ${j.meta.totalPublished}`);
          }
          if (typeof j.meta.scriptHash !== 'string' || j.meta.scriptHash.length === 0) {
            throw new Error('meta.scriptHash missing — cache may be stale');
          }
          if (j.data.some(x => x && typeof x === 'object' && !x.addr)) {
            throw new Error('data.json contains records with empty addr (empty-record exclusion failed)');
          }
          console.log(`shape+content OK (${j.data.length} records, totalPublished=${j.meta.totalPublished})`);
          NODE

      - name: Validate docs/clinics.json (strict JSON)
        if: hashFiles('docs/clinics.json') != ''
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const j = JSON.parse(fs.readFileSync('docs/clinics.json','utf8'));
          if (!j || typeof j !== 'object') throw new Error('clinics.json must be an object');
          if (!j.meta || typeof j.meta !== 'object') throw new Error('missing meta');
          if (!Array.isArray(j.data)) throw new Error('data must be an array');
          if (j.data.length === 0) throw new Error('clinics.json has no records');
          const r = j.data[0];
          for (const k of ['id','pref','name','addr']) {
            if (!(k in r)) throw new Error(`missing key in records: ${k}`);
          }
          if (!r.id.startsWith('c')) throw new Error('clinic IDs must start with "c"');
          console.log(`clinics.json OK: ${j.data.length} records`);
          NODE

      - name: Update sitemap.xml lastmod
        run: |
          TODAY=$(date -I)
          sed -i "s|<lastmod>[^<]*</lastmod>|<lastmod>${TODAY}</lastmod>|" docs/sitemap.xml

      - name: Commit & push if changed
        run: |
          set -e
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Auto: update data ($(date -I))"
            git push
          else
            echo "No changes."
          fi
