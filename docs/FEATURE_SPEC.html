<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>機能仕様書 — mhlw-ec-pharmacy-finder</title>
<script src="marked.min.js"></script>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  line-height: 1.6;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
  color: #24292f;
  background: #fff;
}
h1 { font-size: 1.8em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
h2 { font-size: 1.4em; border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; margin-top: 1.5em; }
h3 { font-size: 1.15em; margin-top: 1.2em; }
a { color: #0969da; text-decoration: none; }
a:hover { text-decoration: underline; }
code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
pre code { background: none; padding: 0; }
table { border-collapse: collapse; width: 100%; margin: 1em 0; }
th, td { border: 1px solid #d0d7de; padding: 6px 13px; text-align: left; }
th { background: #f6f8fa; font-weight: 600; }
hr { border: none; border-top: 1px solid #d0d7de; margin: 2em 0; }
blockquote { border-left: 4px solid #d0d7de; margin: 1em 0; padding: 0.5em 1em; color: #57606a; }
strong { font-weight: 600; }
ul, ol { padding-left: 2em; }
del { color: #888; }
.nav { margin-bottom: 1.5em; font-size: 0.9em; }
.nav a { margin-right: 1em; }
#content { min-height: 200px; }
</style>
</head>
<body>
<div class="nav">
  <a href="./">🔍 薬局検索サイト</a>
  <a href="HOURS_PARSER.html">📄 パーサー設計</a>
  <a href="https://github.com/odakin/mhlw-ec-pharmacy-finder">📦 GitHub</a>
</div>
<div id="content">読み込み中...</div>
<script>
fetch('FEATURE_SPEC.md?v=' + Date.now())
  .then(function(r) { return r.text(); })
  .then(function(md) {
    md = md.replace(/^---\n[\s\S]*?\n---\n/, '');
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(function() {
    document.getElementById('content').textContent = '読み込みに失敗しました。';
  });
</script>
</body>
</html>
